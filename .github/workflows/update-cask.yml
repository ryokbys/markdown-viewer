name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Parse version from tag
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of release DMG
        id: sha
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          URL="https://github.com/ryokbys/markdown-viewer/releases/download/${TAG}/Markdown%20Viewer_${VERSION}_aarch64.dmg"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ryokbys/homebrew-markdown-viewer
          token: ${{ secrets.TAP_REPO_TOKEN }}

      - name: Update cask version and sha256
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/markdown-viewer.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"${SHA256}\"/" Casks/markdown-viewer.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/markdown-viewer.rb
          git commit -m "chore: bump markdown-viewer to ${{ steps.meta.outputs.version }}"
          git push
