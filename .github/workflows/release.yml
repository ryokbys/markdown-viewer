name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: false

      - name: Create GitHub Release and upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DMG="src-tauri/target/release/bundle/dmg/Markdown Viewer_${VERSION}_aarch64.dmg"
          gh release create "$TAG" "$DMG" \
            --title "$TAG" \
            --generate-notes \
            --latest

      - name: Update Homebrew tap cask
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          DMG="src-tauri/target/release/bundle/dmg/Markdown Viewer_${VERSION}_aarch64.dmg"
          SHA256=$(shasum -a 256 "$DMG" | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/ryokbys/homebrew-markdown-viewer.git /tmp/tap
          cd /tmp/tap
          sed -i '' "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/markdown-viewer.rb
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"${SHA256}\"/" Casks/markdown-viewer.rb
          sed -i '' "s/sha256 :no_check/sha256 \"${SHA256}\"/" Casks/markdown-viewer.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/markdown-viewer.rb
          git commit -m "chore: bump markdown-viewer to ${VERSION}"
          git push
